<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJI Sales - Purchase Order</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 1rem; }
    .container { background: white; border-radius: 1rem; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 420px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #0f172a; }
    .subtitle { font-size: 0.875rem; color: #64748b; margin-bottom: 1.5rem; }
    .logo { color: #2563eb; font-weight: 700; font-size: 1.25rem; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.375rem; }
    input { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    button { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; display: none; text-align: center; }
    .msg.success { display: block; background: #dcfce7; color: #166534; }
    .msg.error { display: block; background: #fee2e2; color: #991b1b; }
    .msg.loading { display: block; background: #eff6ff; color: #1e40af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">DJI Sales</div>
    <h1>Purchase Order</h1>
    <p class="subtitle">Fill in the details to place your order</p>

    <form id="orderForm">
      <div class="form-group">
        <label for="name">Retailer Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. John's Drones" required>
      </div>
      <div class="form-group">
        <label for="model">Drone Model</label>
        <input type="text" id="model" name="model" placeholder="e.g. DJI Mini 4 Pro" required>
      </div>
      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" placeholder="e.g. 10" required>
      </div>
      <button type="submit" id="submitBtn">Submit Order</button>
    </form>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const FORM_URL = 'https://script.google.com/macros/s/AKfycbzrC6ihPSTubEsX_RRaqN-4E7jPjMSIfxn3VAAPuVKYigqBFOxykBfq98aPgRErcuA_Uw/exec';

    const form = document.getElementById('orderForm');
    const submitBtn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg loading';
      msg.textContent = 'Submitting order...';
      msg.style.display = 'block';
      submitBtn.disabled = true;

      const data = {
        name: document.getElementById('name').value.trim(),
        model: document.getElementById('model').value.trim(),
        quantity: document.getElementById('quantity').value
      };

      try {
        const res = await fetch(FORM_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        msg.className = 'msg success';
        msg.textContent = 'Order submitted successfully!';
        form.reset();
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Failed to submit order. Please try again.';
      } finally {
        submitBtn.disabled = false;
        setTimeout(() => { msg.style.display = 'none'; }, 4000);
      }
    });
  </script>
</body>
</html>
